<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- connections: input to hidden -->
  <line x1="4" y1="5" x2="10" y2="4" stroke="#111111" stroke-width="1"/>
  <line x1="4" y1="5" x2="10" y2="10" stroke="#111111" stroke-width="1"/>
  <line x1="4" y1="5" x2="10" y2="16" stroke="#111111" stroke-width="1"/>
  <line x1="4" y1="15" x2="10" y2="4" stroke="#111111" stroke-width="1"/>
  <line x1="4" y1="15" x2="10" y2="10" stroke="#111111" stroke-width="1"/>
  <line x1="4" y1="15" x2="10" y2="16" stroke="#111111" stroke-width="1"/>
  <!-- connections: hidden to output -->
  <line x1="10" y1="4" x2="16" y2="10" stroke="#111111" stroke-width="1"/>
  <line x1="10" y1="10" x2="16" y2="10" stroke="#111111" stroke-width="1"/>
  <line x1="10" y1="16" x2="16" y2="10" stroke="#111111" stroke-width="1"/>
  <!-- input layer nodes -->
  <circle cx="4" cy="5" r="2" fill="#111111"/>
  <circle cx="4" cy="15" r="2" fill="#111111"/>
  <!-- hidden layer nodes -->
  <circle cx="10" cy="4" r="2" fill="#111111"/>
  <circle cx="10" cy="10" r="2" fill="#111111"/>
  <circle cx="10" cy="16" r="2" fill="#111111"/>
  <!-- output layer node -->
  <circle cx="16" cy="10" r="2" fill="#111111"/>
</svg>
